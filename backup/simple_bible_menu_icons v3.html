<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聖書の教え</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#f3f3f3;
    color:#fff;
}

.container{
    max-width:480px;
    margin:0 auto;
    padding:24px 20px 120px;
}


.menu-item{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;

    height:180px;
    margin-bottom:18px;
    padding:24px;

    border-radius:24px;

    text-decoration:none;
    color:#fff;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow:hidden;

    box-shadow:0 6px 18px rgba(0,0,0,0.15);
    transition:0.2s ease;
}

.menu-item:hover{
    transform:translateY(-3px);
}

.menu-item:active{
    transform:scale(0.98);
}

/* 左側画像 */
/* 背景画像を暗くして文字を見やすく */
.menu-item::before{
    content:"";
    position:absolute;
    inset:0;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.35),
        rgba(0,0,0,0.55)
    );

    z-index:0;
}

/* 右側文字背景 */
.menu-item::after{
    content:"";
    position:absolute;
    right:0;
    top:0;
    width:58%;
    height:100%;

    background:linear-gradient(
        to right,
        rgba(79,115,184,0.95),
        rgba(79,115,184,1)
    );

    z-index:0;
}

/* 背景画像 */
.stress::before{
    background-image:
    url("images/stress.png"),
    url("https://drive.google.com/uc?export=view&id=1ewyVFSOW0J29Y7m-9Ow2GtqbD9oTZxmk");
}

.family::before{
    background-image:
    url("images/family.png"),
    url("https://drive.google.com/uc?export=view&id=1QyGMIJNsOySIB1GZTGMJD4wvSP3_2tFP");
}

.young::before{
    background-image:
    url("images/young.png"),
    url("https://drive.google.com/uc?export=view&id=1C-f_V2eibWrB5bWGgoc5UIdVberUIzr9");
}

.children::before{
    background-image:
    url("images/children.png"),
    url("https://drive.google.com/uc?export=view&id=1SFPjpAWnAwczoH3tw5yDdEIXGctVO4KZ");
}

.god::before{
    background-image:
    url("images/god.png"),
    url("https://drive.google.com/uc?export=view&id=1ry4mV1_HUCzwmAZ2l2Kyc9CaeZT54LJZ");
}

.science::before{
    background-image:
    url("images/science.png"),
    url("https://drive.google.com/uc?export=view&id=1ZXS3CNHr244PYXanGCZbConMlqTGZcmN");
}

/* 大きな文字を画像の上に重ねる */
.title{
    position:relative;
    z-index:1;

    width:70%;              /* ボタンの7割くらい */
    text-align:center;

    font-size:3rem;
    font-weight:800;
    line-height:1.05;

    text-shadow:
        0 3px 8px rgba(0,0,0,0.6);

    word-break:keep-all;
}

.external{
    position:absolute;
    top:18px;
    right:18px;
    z-index:1;

    font-size:1.5rem;
    color:#fff;
}

@media(max-width:480px){
    .menu-item{
        height:150px;
    }

    .title{
        width:75%;
        font-size:2.2rem;
    }
}

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(20,20,20,0.92);
    padding:16px;
    display:flex;
    justify-content:center;
}

.footer a{
    color:#fff;
    text-decoration:none;
    border:1px solid rgba(255,255,255,0.25);
    padding:12px 40px;
    border-radius:999px;
}

</style>
</head>

<body>
<div class="container">

<a href="https://www.jw.org/ja/聖書の教え/ストレスと不安/"
   class="menu-item stress"
   target="_blank"
   rel="noopener noreferrer external">
    <div class="title">ストレスと不安</div>
    <div class="external">↗</div>
</a>

<a href="https://www.jw.org/ja/聖書の教え/結婚-子育て/"
   class="menu-item family"
   target="_blank"
   rel="noopener noreferrer external">
    <div class="title">結婚と子育て</div>
    <div class="external">↗</div>
</a>

<a href="https://www.jw.org/ja/聖書の教え/若い人/"
   class="menu-item young"
   target="_blank"
   rel="noopener noreferrer external">
    <div class="title">若い人</div>
    <div class="external">↗</div>
</a>

<a href="https://www.jw.org/ja/聖書の教え/子ども/"
   class="menu-item children"
   target="_blank"
   rel="noopener noreferrer external">
    <div class="title">子ども</div>
    <div class="external">↗</div>
</a>

<a href="https://www.jw.org/ja/聖書の教え/神を知る/"
   class="menu-item god"
   target="_blank"
   rel="noopener noreferrer external">
    <div class="title">神を知る</div>
    <div class="external">↗</div>
</a>

<a href="https://www.jw.org/ja/聖書の教え/科学/"
   class="menu-item science"
   target="_blank"
   rel="noopener noreferrer external">
    <div class="title">科学と聖書</div>
    <div class="external">↗</div>
</a>

</div>

<div class="footer">
    <a href="https://www.jw.org/ja/"
       target="_blank"
       rel="noopener noreferrer external">
       jw.org
    </a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聖書の教え</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#f3f3f3;
    color:#fff;
}

.container{
    max-width:480px;
    margin:0 auto;
    padding:24px 20px 120px;
}

.menu-item{
    position:relative;
    display:flex;
    align-items:flex-end;

    height:180px;
    margin-bottom:18px;
    padding:24px;

    border-radius:24px;

    text-decoration:none;
    color:#fff;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow:hidden;

    box-shadow:0 6px 18px rgba(0,0,0,0.15);

    transition:0.2s ease;
}

.menu-item:hover{
    transform:translateY(-3px);
}

.menu-item:active{
    transform:scale(0.98);
}

/* 暗いオーバーレイ */
.menu-item::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.2)
    );
}

.title{
    position:relative;
    z-index:1;

    font-size:4rem;
    font-weight:700;
    line-height:1.2;

    text-shadow:0 2px 6px rgba(0,0,0,0.5);
}

.external{
    position:absolute;
    top:18px;
    right:18px;
    z-index:1;

    font-size:1.4rem;
    color:#fff;
}

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;

    background:rgba(20,20,20,0.92);

    padding:16px;

    display:flex;
    justify-content:center;
}

.footer a{
    color:#fff;
    text-decoration:none;
    border:1px solid rgba(255,255,255,0.25);
    padding:12px 40px;
    border-radius:999px;
}

/* モバイル */
@media(max-width:480px){
    .menu-item{
        height:150px;
    }

    .title{
        font-size:1.6rem;
    }
}
</style>
</head>

<body>
<div class="container">

<!-- ストレスと不安 -->
<a href="https://www.jw.org/ja/聖書の教え/ストレスと不安/"
   class="menu-item"
   style="background-image:url('images/stress.png'), url('images/stress_default.png');"
   target="_blank"
   rel="noopener noreferrer external">

    <div class="title">ストレスと不安</div>
    <div class="external">↗</div>
</a>

<!-- 結婚と子育て -->
<a href="https://www.jw.org/ja/聖書の教え/結婚-子育て/"
   class="menu-item"

   target="_blank"
   rel="noopener noreferrer external">

    <div class="title">結婚と子育て</div>
    <div class="external">↗</div>
</a>

<!-- 若い人 -->
<a href="https://www.jw.org/ja/聖書の教え/若い人/"
   class="menu-item"
   style="background-image:url('images/young.png'), url('images/young_default.png');"
   target="_blank"
   rel="noopener noreferrer external">

    <div class="title">若い人</div>
    <div class="external">↗</div>
</a>

<!-- 子ども -->
<a href="https://www.jw.org/ja/聖書の教え/子ども/"
   class="menu-item"
   style="background-image:url('images/children.png'), url('images/children_default.png');"
   target="_blank"
   rel="noopener noreferrer external">

    <div class="title">子ども</div>
    <div class="external">↗</div>
</a>

<!-- 神を知る -->
<a href="https://www.jw.org/ja/聖書の教え/神を知る/"
   class="menu-item"
   style="background-image:url('images/god.png'), url('images/god_default.png');"
   target="_blank"
   rel="noopener noreferrer external">

    <div class="title">神を知る</div>
    <div class="external">↗</div>
</a>

<!-- 科学と聖書 -->
<a href="https://www.jw.org/ja/聖書の教え/科学/"
   class="menu-item"
   style="background-image:url('images/science.png'), url('images/science_default.png');"
   target="_blank"
   rel="noopener noreferrer external">

    <div class="title">科学と聖書</div>
    <div class="external">↗</div>
</a>

</div>

<div class="footer">
    <a href="https://www.jw.org/ja/"
       target="_blank"
       rel="noopener noreferrer external">
       jw.org
    </a>
</div>

</body>
</html>

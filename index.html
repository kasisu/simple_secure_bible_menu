<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聖書の教え</title>

<!-- セキュリティ -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               img-src 'self' data:;
               style-src 'self' 'unsafe-inline';
               script-src 'self' 'unsafe-inline';
               connect-src 'none';
               object-src 'none';
               frame-ancestors 'none';
               base-uri 'self';
               form-action 'none';">

<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=(), payment=(), usb=()">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="color-scheme" content="light only">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#f3f3f3;
    color:#4f73b8;
}

.container{
    max-width:480px;
    margin:0 auto;
    padding:24px 20px 120px;
}

.menu-item{
    display:flex;
    align-items:center;
    gap:18px;
    background:#fff;
    padding:22px 18px;
    margin-bottom:16px;
    border-radius:22px;
    text-decoration:none;
    color:#4f73b8;
    box-shadow:0 3px 12px rgba(0,0,0,0.05);
    transition:0.2s ease;
}

.menu-item:hover{
    transform:translateY(-2px);
}

.menu-item:active{
    transform:scale(0.98);
}

.icon{
    width:64px;
    height:64px;
    border-radius:18px;
    object-fit:cover;
    flex-shrink:0;
    background:#f5f7fb;
}

.fallback{
    display:none;
    align-items:center;
    justify-content:center;
    width:64px;
    height:64px;
    border-radius:18px;
    background:#f5f7fb;
    font-size:30px;
    flex-shrink:0;
}

.title{
    font-size:1.45rem;
    flex:1;
}

.external{
    color:#999;
    font-size:1.2rem;
}

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(20,20,20,0.92);
    padding:16px;
    display:flex;
    justify-content:center;
}

.footer a{
    color:#fff;
    text-decoration:none;
    border:1px solid rgba(255,255,255,0.25);
    padding:12px 40px;
    border-radius:999px;
}

@media(max-width:480px){
    .title{
        font-size:1.2rem;
    }
}
</style>
</head>

<body>
<div class="container">

<!-- ストレスと不安 -->
<a href="https://www.jw.org/ja/聖書の教え/ストレスと不安/"
   class="menu-item"
   target="_blank"
   rel="noopener noreferrer external">

    <img data-default="images\stress.png"
         src="https://drive.google.com/uc?export=view&id=1ewyVFSOW0J29Y7m-9Ow2GtqbD9oTZxmk"
         alt="ストレスと不安"
         class="icon">

    <div class="fallback">☀️</div>
    <div class="title">ストレスと不安</div>
    <div class="external">↗</div>
</a>

<!-- 結婚と子育て -->

    <img data-default="images\family.png"

         alt="結婚と子育て"
         class="icon">

    <div class="fallback">👨‍👩‍👧</div>
    <div class="title">結婚と子育て</div>
    <div class="external">↗</div>
</a>

<!-- 若い人 -->
<a href="https://www.jw.org/ja/聖書の教え/若い人/"
   class="menu-item"
   target="_blank"
   rel="noopener noreferrer external">

    <img data-default="images\young.png"
         src="https://drive.google.com/uc?export=view&id=1C-f_V2eibWrB5bWGgoc5UIdVberUIzr9"
         alt="若い人"
         class="icon">

    <div class="fallback">🧑‍🤝‍🧑</div>
    <div class="title">若い人</div>
    <div class="external">↗</div>
</a>

<!-- 子ども -->
<a href="https://www.jw.org/ja/聖書の教え/子ども/"
   class="menu-item"
   target="_blank"
   rel="noopener noreferrer external">

    <img data-default="images\children.png"
         src="https://drive.google.com/uc?export=view&id=1SFPjpAWnAwczoH3tw5yDdEIXGctVO4KZ"
         alt="子ども"
         class="icon">

    <div class="fallback">👦👧</div>
    <div class="title">子ども</div>
    <div class="external">↗</div>
</a>

<!-- 神を知る -->

    <div class="external">↗</div>
</a>

<!-- 科学と聖書 -->

    <img data-default="images\science.png"

    <div class="fallback">⚛️</div>
    <div class="title">科学と聖書</div>
    <div class="external">↗</div>
</a>

</div>

<!-- フッター -->
<div class="footer">
    <a href="https://www.jw.org/ja/"
       target="_blank"
       rel="noopener noreferrer external">
       jw.org
    </a>
</div>

<!-- 画像切替処理 -->
<script>
document.querySelectorAll('.icon').forEach(img => {
    img.onerror = function() {

        // 元画像が無い → 代替画像に切替
        if (!this.dataset.fallbackTried) {
            this.dataset.fallbackTried = "true";
            this.src = this.dataset.default;
            return;
        }

        // 代替画像も無い → 絵文字表示
        this.style.display = "none";
        this.nextElementSibling.style.display = "flex";
    };
});
</script>

</body>
</html>
